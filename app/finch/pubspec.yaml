name: finch
description: A private, peer-to-peer social feed.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Serialization
  cbor: ^6.5.1

  # HTTP server (Plan 07)
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # WebSocket signaling (Plan 16)
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^3.0.1

  # Database (Plan 02)
  drift: ^2.22.1
  sqlcipher_flutter_libs: ^0.6.4

  # QR codes (Plan 04/08)
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0

  # Networking (Plan 09)
  multicast_dns: ^0.3.2+8

  # Image processing (Plan 05)
  image: ^4.5.2

  # Crypto (Plan 03) — libsodium via native asset build hooks
  sodium: ^4.0.2

  # Secure storage (Plan 02/03)
  flutter_secure_storage: ^9.2.3

  # File paths
  path_provider: ^2.1.5

  # Utilities
  collection: ^1.19.1
  path: ^1.9.1
  sqlite3: ^2.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  custom_lint: ^0.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/bip39_english.txt
