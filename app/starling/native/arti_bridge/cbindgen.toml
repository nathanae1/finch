language = "C"
include_guard = "ARTI_BRIDGE_H"
pragma_once = true
autogen_warning = "/* Generated by cbindgen — do not edit. */"
include_version = true
documentation = true
documentation_style = "doxy"
no_includes = false
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
style = "type"

[export]
prefix = ""

[parse]
parse_deps = false
