# 16 KB ELF page-size alignment for Android targets.
# Without this, libstarling_bridge.so loads in compat mode on Android 15+
# (16 KB-page) devices, and Play Store submissions targeting Android 15
# will be rejected after the Nov 2025 cutover.
#
# Ref: https://developer.android.com/guide/practices/page-sizes
[target.aarch64-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.x86_64-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]
